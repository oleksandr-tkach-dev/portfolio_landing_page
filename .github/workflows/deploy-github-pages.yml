# GitHub Pages: build on main/master, push ./dist to branch `gh-pages`.
#
# PAGES_BASE must match how GitHub serves the site:
#   • User/org site (repo username.github.io) → live at https://USER.github.io/ → use / below.
#   • Project site (repo OTHER) → live at https://USER.github.io/REPO/ → set /REPO/ here.
#
# Settings → Pages → Deploy from branch → gh-pages, folder / (root).
#
# Live (user Pages): https://oleksandr-tkach-dev.github.io/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PAGES_BASE: /

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build && node scripts/postbuild-gh-pages.mjs
        env:
          VITE_BASE_URL: ${{ env.PAGES_BASE }}

      - name: Verify dist is a Vite production bundle
        run: |
          if grep -qF '/src/main.tsx' dist/index.html; then
            echo '::error::dist/index.html still references /src/main.tsx (dev template).'
            exit 1
          fi

      - name: Push dist to gh-pages branch
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
