# GitHub Pages — official Actions deployment (no PAT, no push to gh-pages)
#
# Docs: https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow
#
# REQUIRED one-time (or Pages will 404 / deploy will fail):
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   (NOT "Deploy from a branch". Branch-based deploy + PAT caused 403 when the token
#   lacked Contents: Read and write on this repo or could not force-push gh-pages.)
#
# Optional: first run may ask you to approve the "github-pages" environment.
#
# Site: https://oleksandr-tkach-dev.github.io/portfolio_landing_page/
# Rename repo → update PAGES_BASE below.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PAGES_BASE: /portfolio_landing_page/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build && node scripts/postbuild-gh-pages.mjs
        env:
          VITE_BASE_URL: ${{ env.PAGES_BASE }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
