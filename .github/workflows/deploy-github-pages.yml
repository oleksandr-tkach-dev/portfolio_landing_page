# GitHub Pages (publish from branch: gh-pages / root)
#
# IMPORTANT (from GitHub docs — "Troubleshooting publishing from a branch"):
# "Commits pushed by a GitHub Actions workflow that uses the GITHUB_TOKEN do not
# trigger a GitHub Pages build."
# So we push with a PAT so Pages actually deploys.
#
# One-time setup:
# 1) Repo → Settings → Secrets and variables → Actions → New repository secret
#    Name: GH_PAGES_TOKEN
#    Value: fine-grained PAT with this repo only, permission "Contents: Read and write"
#    (or a classic PAT with "repo" scope).
# 2) Repo → Settings → Pages → Source: "Deploy from a branch" → Branch: gh-pages, / (root) → Save.
#
# Site URL: https://oleksandr-tkach-dev.github.io/portfolio_landing_page/
# If you rename the repo, change PAGES_BASE below to /new-repo-name/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Must match the repo segment in https://<user>.github.io/<repo>/
  PAGES_BASE: /portfolio_landing_page/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build && node scripts/postbuild-gh-pages.mjs
        env:
          VITE_BASE_URL: ${{ env.PAGES_BASE }}

      - name: Require GH_PAGES_TOKEN
        env:
          PAT: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::Add repository secret GH_PAGES_TOKEN (PAT with Contents: Read and write on this repo). GitHub does not deploy Pages when gh-pages is updated only with GITHUB_TOKEN. See comments at top of this workflow file."
            exit 1
          fi

      - name: Publish to gh-pages (PAT required — GITHUB_TOKEN does not trigger Pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_access_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          enable_jekyll: false
