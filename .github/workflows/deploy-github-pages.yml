# GitHub Pages — Actions deployment (no PAT).
#
# Architecture: source integration on `main` / `master`; **build + deploy run only from
# `gh-pages`** (matches Environment → github-pages deployment branch rules + OIDC ref).
#
# Ship: merge `main` → `gh-pages` (PR or fast-forward), or workflow_dispatch on `gh-pages`.
#
# One-time: Settings → Pages → Source: GitHub Actions.
# One-time: `git checkout -b gh-pages main && git push -u origin gh-pages` if missing.
#
# Site: https://oleksandr-tkach-dev.github.io/portfolio_landing_page/
# Rename repo → update PAGES_BASE below.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master, gh-pages]
  pull_request:
    branches: [main, master, gh-pages]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PAGES_BASE: /portfolio_landing_page/
  PUBLISH_BRANCH: gh-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build && node scripts/postbuild-gh-pages.mjs
        env:
          VITE_BASE_URL: ${{ env.PAGES_BASE }}

      - uses: actions/upload-pages-artifact@v3
        if: >-
          github.ref == format('refs/heads/{0}', env.PUBLISH_BRANCH) &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        with:
          path: dist

  deploy:
    needs: build
    if: >-
      github.ref == format('refs/heads/{0}', env.PUBLISH_BRANCH) &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
